- id: decision
  title: What To Trust Today
  status: evidence
  result: Paper core is solid; saliency is closed; dense optimization nearly reaches the public quantized checkpoint reproduction but not parity.
  interpretation: Trust the bounded systems claim, the public quantized checkpoint reproduction as the fair control, pretrained low-LR calibration as a near miss, and negative evidence as closed.
  artifact_status: summary_only
