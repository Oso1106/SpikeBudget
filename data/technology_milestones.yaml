- id: claim
  title: Bounded Claim Contract
  status: evidence
  result: SNN speed is governed here by differentiation schedule and kernel shape, not by spiking alone.
  interpretation: The claim excludes arbitrary SNN workloads, neuromorphic-device comparisons, and accuracy SOTA.
  artifact_status: summary_only
  artifacts: []
- id: early_mechanism_search
  title: Early Mechanism Search
  status: evidence
  result: Early kernels, event fusion, sequence tasks, and correctness checks established the project vocabulary.
  interpretation: Use as mechanism context before the stronger CUDA evidence.
  artifact_status: summary_only
  artifacts: []
- id: kernel_shape_cutlass_comparison
  title: Kernel Shape Decides
  status: positive
  result: Tiled scalar reduction was 0.098x while the CUTLASS GEMM gradient path was 34.14x.
  interpretation: The same mathematical direction can fail or win depending on kernel shape.
  artifact_status: summary_only
  artifacts: []
- id: task_level_temporal_cuda_benchmark
  title: Task-Level Temporal Training
  status: positive
  result: Matched optimized path was 128.75x memory-cheaper and 6.78x faster on the L4 task.
  interpretation: This is the core task-level benchmark tying optimized work to the materialized reference.
  artifact_status: summary_only
  artifacts: []
- id: real_cuda_timing_correction
  title: Real Baseline Correction
  status: caution
  result: Synthetic reviewer-facing timing was replaced with real CUDA kernels and cudaEvent timing.
  interpretation: The earlier synthetic-history error must remain visible.
  artifact_status: summary_only
  artifacts: []
- id: hardware_counter_repeatability
  title: Counters and Repeatability
  status: positive
  result: Optimized hardware counters reported 70.7% SM / 0.08% DRAM while the materialized reference reported 22.7% SM / 51.3% DRAM.
  interpretation: This provides hardware-counter language plus repeatability context.
  artifact_status: summary_only
  artifacts: []
- id: framework_baseline_comparison
  title: Framework Baselines
  status: evidence
  result: SpikingJelly and snnTorch matched supervised CE workloads; BindsNET STDP is not matched CE.
  interpretation: Useful comparison context, not proof of broad framework dominance.
  artifact_status: summary_only
  artifacts: []
