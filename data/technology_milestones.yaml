- id: decision
  title: What To Trust Today
  status: evidence
  result: Paper core is solid; scratch saliency is closed; dense low-LR scratch optimization is the current positive direction.
  interpretation: Trust the bounded systems claim, the 7B scratch memory-feasibility result as a launch proof, dense low-LR scratch training as the positive optimization direction, and negative scratch evidence as closed.
  artifact_status: summary_only
  artifacts: []
